<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas Activas - Excursiones Delgado</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f7f7;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #02535a;
    }
    .barra-superior {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }
    .btn-agregar, .btn-historicas {
      background-color: #02535a;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }
    .btn-historicas {
      background-color: #6c757d;
    }
    .contador {
      text-align: center;
      color: #555;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }
    th {
      background-color: #02535a;
      color: white;
    }
    .acciones button {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: center;
    }
    .editar-btn {
      background-color: transparent;
      color: white;
    }
    .eliminar-btn {
      background-color: transparent;
      color: white;
    }
  </style>
</head>
<body>
  <h2>📦 Reservas Activas</h2>

  <div class="barra-superior">
    <button class="btn-agregar" onclick="window.location.href='detalle_reserva.html'">➕ Agregar reserva</button>
    <a class="btn-historicas" href="reservas_historicas.html">🕓 Ver reservas históricas</a>
  </div>

  <p class="contador" id="contador"></p>

  <table id="tablaReservas">
    <thead>
      <tr>
        <th>Código</th>
        <th>Cliente</th>
        <th>Teléfono</th>
        <th>Correo</th>
        <th>Destino</th>
        <th>Personas</th>
        <th>Fecha de viaje</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <!-- Reservas se cargarán dinámicamente -->
    </tbody>
  </table>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDUEZgkW-3HbZu2BLej4v0mbDHZf2vRo8",
      authDomain: "tours-460717.firebaseapp.com",
      projectId: "tours-460717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tabla = document.querySelector("#tablaReservas tbody");

    // Convierte los dos formatos de fecha que existen en la base de datos
    // ("2025-06-08" y "21/6/2025") a un objeto Date comparable.
    function parseFechaReserva(str) {
      if (!str) return null;
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
        return new Date(str + "T00:00:00");
      }
      const partes = str.split("/");
      if (partes.length === 3) {
        const [dia, mes, año] = partes.map(Number);
        if (!isNaN(dia) && !isNaN(mes) && !isNaN(año)) {
          return new Date(año, mes - 1, dia);
        }
      }
      return null;
    }

    // Calcula la cantidad de personas cubriendo los 3 esquemas distintos que
    // ha tenido el sistema a lo largo del tiempo:
    // 1) campo "numero" directo (el más nuevo)
    // 2) desglose cantidadAdultos + cantidadNinos + cantidadBebes
    // 3) esquema viejo: arreglo "pasajeros" (acompañantes) + 1 por el titular
    function calcularPersonas(data) {
      if (typeof data.numero === 'number' && data.numero > 0) return data.numero;
      const adultos = data.cantidadAdultos || 0;
      const ninos = data.cantidadNinos || 0;
      const bebes = data.cantidadBebes || 0;
      const sumaDesglose = adultos + ninos + bebes;
      if (sumaDesglose > 0) return sumaDesglose;
      if (Array.isArray(data.pasajeros) && data.pasajeros.length > 0) return data.pasajeros.length + 1;
      return null;
    }

    function cargarReservas() {
      db.collection("reservas").get().then(snapshot => {
        const hoy = new Date();
        hoy.setHours(0, 0, 0, 0);

        let contadorActivas = 0;
        let contadorSinFecha = 0;

        snapshot.forEach(doc => {
          const data = doc.data();
          const fecha = parseFechaReserva(data.fechaReserva);

          // Si la fecha ya pasó, esta reserva pertenece a reservas_historicas.html, se omite aquí.
          if (fecha && fecha < hoy) return;

          if (!fecha) contadorSinFecha++;
          contadorActivas++;

          const fila = document.createElement("tr");
          fila.innerHTML = `
            <td>${doc.id}</td>
            <td>${data.nombreTitular || '-'}</td>
            <td>${data.telefono || '-'}</td>
            <td>${data.correo || '-'}</td>
            <td>${data.nombreDestino || data.destino || '-'}</td>
            <td>${calcularPersonas(data) ?? '-'}</td>
            <td>${data.fechaReserva || '-'}</td>
            <td class="acciones">
              <button class="editar-btn" onclick="window.location.href='detalle_reserva.html?codigo=${doc.id}'">✏️</button>
              <button class="eliminar-btn" onclick="eliminarReserva('${doc.id}')">🗑️</button>
            </td>
          `;
          tabla.appendChild(fila);
        });

        const contadorEl = document.getElementById("contador");
        let texto = `${contadorActivas} reserva${contadorActivas === 1 ? '' : 's'} activa${contadorActivas === 1 ? '' : 's'}`;
        if (contadorSinFecha > 0) {
          texto += ` (${contadorSinFecha} sin fecha de viaje registrada — revisar)`;
        }
        contadorEl.textContent = texto;
      });
    }

    function eliminarReserva(id) {
      if (confirm("¿Deseas eliminar esta reserva?")) {
        db.collection("reservas").doc(id).delete().then(() => {
          alert("Reserva eliminada");
          location.reload();
        });
      }
    }
    window.onload = cargarReservas;
  </script>
</body>
</html>
