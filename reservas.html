<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reservas - Excursiones Delgado</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f7f7;
      padding: 20px;
    }
    h2 {
      text-align: center;
      color: #02535a;
    }
    .btn-agregar {
      background-color: #02535a;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      margin-bottom: 20px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }
    th {
      background-color: #02535a;
      color: white;
    }
    .acciones button {
      display: flex;
      gap: 6px;
      justify-content: center;
      align-items: center;
    }
    .editar-btn {
      background-color: transparent;
      color: white;
    }
    .eliminar-btn {
      background-color: transparent;
      color: white;
    }
  </style>
</head>
<body>
  <h2>📦 Reservas Registradas</h2>
  <button class="btn-agregar" onclick="window.location.href='detalle_reserva.html'">➕ Agregar reserva</button>
  <table id="tablaReservas">
    <thead>
      <tr>
        <th>Código</th>
        <th>Cliente</th>
        <th>Teléfono</th>
        <th>Correo</th>
        <th>Destino</th>
        <th>Personas</th>
        <th>Fecha de viaje</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <!-- Reservas se cargarán dinámicamente -->
    </tbody>
  </table>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDUEZgkW-3HbZu2BLej4v0mbDHZf2vRo8",
      authDomain: "tours-460717.firebaseapp.com",
      projectId: "tours-460717"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const tabla = document.querySelector("#tablaReservas tbody");

    // FIX: los nombres de campo no coincidían con el esquema real que usa
    // detalle_reserva.html (nombreTitular, telefono, correo, fechaReserva, numero
    // — en vez de nombreCliente, telefonoCliente, correoCliente, fechaViaje,
    // pasajeros.length). Por eso la mayoría de filas mostraban "-".
    //
    // También se corrige el destino: ahora se usa nombreDestino (texto legible)
    // con destino (el ID) como respaldo, en vez de mostrar siempre el ID sin resolver.
    function cargarReservas() {
      db.collection("reservas").get().then(snapshot => {
        snapshot.forEach(doc => {
          const data = doc.data();
          const fila = document.createElement("tr");
          fila.innerHTML = `
            <td>${doc.id}</td>
            <td>${data.nombreTitular || '-'}</td>
            <td>${data.telefono || '-'}</td>
            <td>${data.correo || '-'}</td>
            <td>${data.nombreDestino || data.destino || '-'}</td>
            <td>${data.numero || ((data.cantidadAdultos || 0) + (data.cantidadNinos || 0) + (data.cantidadBebes || 0)) || '-'}</td>
            <td>${data.fechaReserva || '-'}</td>
            <td class="acciones">
              <button class="editar-btn" onclick="window.location.href='detalle_reserva.html?codigo=${doc.id}'">✏️</button>
              <button class="eliminar-btn" onclick="eliminarReserva('${doc.id}')">🗑️</button>
            </td>
          `;
          tabla.appendChild(fila);
        });
      });
    }
    function eliminarReserva(id) {
      if (confirm("¿Deseas eliminar esta reserva?")) {
        db.collection("reservas").doc(id).delete().then(() => {
          alert("Reserva eliminada");
          location.reload();
        });
      }
    }
    window.onload = cargarReservas;
  </script>
</body>
</html>
