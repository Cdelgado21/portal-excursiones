  <style>
/* NUEVO: menú lateral de navegación (mismo estilo que el resto del
   sistema) — esta página nunca lo había tenido. */
.toggle-btn {
  position: fixed;
  top: 20px;
  left: 20px;
  font-size: 24px;
  background: white;
  color: #02535a;
  border: none;
  border-radius: 50%;
  padding: 8px 12px;
  z-index: 1100;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
.sidebar {
  position: fixed;
  top: 0;
  left: 0;
  width: 250px;
  height: 100%;
  background-color: #02535a;
  color: white;
  padding: 20px;
  transform: translateX(-250px);
  transition: transform 0.3s ease;
  z-index: 1000;
  overflow-y: auto;
}
.sidebar.active {
  transform: translateX(0);
}
.sidebar .user-info {
  text-align: center;
  margin-bottom: 20px;
  margin-top: 40px;
}
.sidebar .user-info .avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  margin-bottom: 10px;
}
.sidebar .user-info h3 {
  font-size: 1rem;
  margin: 0;
  color: white;
}
.sidebar .user-info small {
  font-size: 0.8rem;
  color: #f4f7f8;
}
.nav-links {
  list-style: none;
  padding: 0;
}
.nav-links li a {
  background-color: #f4f7f8;
  color: #02535a;
  padding: 8px 12px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  text-decoration: none;
  margin-bottom: 8px;
  font-weight: bold;
}
.nav-links li a:hover {
  background-color: #e0e0e0;
}
.nav-links li a.activo {
  background-color: #ffb703;
  color: #02535a;
}
.nav-links .icon {
  margin-right: 10px;
  font-size: 1.2rem;
}
main#contenidoPrincipal {
  margin-left: 0;
  padding: 20px 20px 20px 70px;
  transition: margin-left 0.3s ease;
  box-sizing: border-box;
}
main#contenidoPrincipal.sidebar-visible {
  margin-left: 250px;
  padding-left: 20px;
}
@media screen and (max-width: 768px) {
  main#contenidoPrincipal.sidebar-visible {
    margin-left: 0;
    padding-left: 70px;
  }
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #f0f7f7;
  padding: 0;
  margin: 0;
  font-size: 16px;
}

.menu-bar {
  display: flex;
  align-items: center;
  gap: 15px;
  background-color: white;
  padding: 15px 25px;
  border-radius: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.08);
  margin-bottom: 25px;
}

.menu-bar img {
  height: 60px;
  margin-right: 15px;
  cursor: pointer;
}

.menu-bar button {
  font-size: 16px;
  padding: 10px 20px;
  border: none;
  background-color: #02535a;
  color: white;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.2s ease;
}

.menu-bar button:hover {
  background-color: #036a6d;
}

h2 {
  text-align: center;
  font-size: 24px;
  margin-top: 20px;
  margin-bottom: 25px;
  color: #02535a;
}

.tabla-container {
  max-width: 100%;
  overflow-x: auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.acciones {
  display: flex;
  justify-content: flex-start;
  gap: 12px;
  margin-bottom: 15px;
}

.btn-agregar, .btn-descarga {
  font-size: 15px;
  padding: 10px 20px;
  border-radius: 8px;
  background-color: #02535a;
  color: white;
  border: none;
  cursor: pointer;
}

.btn-agregar:hover,
.btn-descarga:hover {
  background-color: #036a6d;
}

table {
  width: 100%;
  min-width: 800px;
  border-collapse: collapse;
}

th, td {
  border: 1px solid #ccc;
  padding: 14px;
  font-size: 15px;
  text-align: center;
  vertical-align: middle;
}

th {
  background-color: #02535a;
  color: white;
  font-size: 16px;
}

.btn-estado {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
  color: white;
  background-color: #28a745;
  transition: all 0.2s ease;
}

.btn-estado.inactivo {
  background-color: #dc3545;
}

.btn-estado:hover {
  transform: scale(1.05);
  background-color: #218838;
}

.btn-estado.inactivo:hover {
  background-color: #c82333;
}

.btn-editar,
.btn-eliminar {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  color: white;
  background-color: #f49859;
  transition: all 0.2s ease;
}

.btn-editar:hover,
.btn-eliminar:hover {
  background-color: #dd7e37;
  transform: scale(1.05);
}

@media (max-width: 768px) {
  .menu-bar {
    flex-direction: column;
    align-items: flex-start;
  }

  .menu-bar button {
    width: 100%;
  }

  table {
    font-size: 14px;
  }
}
</style>
</head>
<body>

  <main id="contenidoPrincipal">

  <div class="menu-bar">

    <button onclick="window.location.href='menu.html'">Menú</button>

    <button onclick="window.location.href='reservas.html'">Reservas</button>

  </div>

  <h2>Catálogo de Tours</h2>
  <div class="tabla-container">
    <div class="acciones">
    <button class="btn-agregar" onclick="window.location.href='detalle_tours.html'">+ Nuevo Tour</button>
      <button class="btn-descarga" onclick="exportarTabla()">📄 Exportar PDF</button>
      <button class="btn-descarga" onclick="descargarCSV()">📥 Exportar CSV</button>
    </div>
    <table id="tablaTours">
     <thead>
  <tr>
    <th>Nombre</th>
    <th>Estado</th>
    <th>Editar</th>
    <th>Eliminar</th>
  </tr>
</thead>
      <tbody id="tabla-body"><tr><td colspan="13">Cargando tours...</td></tr></tbody>

  <script>
    // FIX: firebaseConfig estaba incompleto (le faltaban storageBucket,
    // messagingSenderId y appId) y tenía la misma apiKey mal escrita que ya
    // encontramos en otros archivos — se corrige aquí para que quede igual a
    // la configuración real usada en el resto del sistema.
    const firebaseConfig = {
      apiKey: "AIzaSyDUEZgkrW-3HbZu2BLej4v0mbDHZf2vRo8",
      authDomain: "tours-460717.firebaseapp.com",
      projectId: "tours-460717",
      storageBucket: "tours-460717.firebasestorage.app",
      messagingSenderId: "1000749333444",
      appId: "1:1000749333444:web:73437891b59a96b6a4c291"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let tourActualId = null;

    function agregarHotel(nombre = "", info = "") {
  const container = document.getElementById("hotelesContainer");
  const div = document.createElement("div");
  div.className = "hotel-entry";
  div.innerHTML = `
    <input placeholder="Nombre del hotel" class="hotel-nombre" type="text" value="${nombre}" />
    <textarea placeholder="Información del hotel" class="hotel-info">${info}</textarea>
  `;
  container.appendChild(div);
}

     function cargarTours() {
      db.collection("tours").get().then(snapshot => {
        const tbody = document.getElementById("tabla-body");
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
          const t = doc.data();
          const fila = document.createElement("tr");
          const hotelNombres = (t.hoteles || []).map(h => `<b>${h.nombre}</b>`).join('<hr>');
          const hotelInfo = (t.hoteles || []).map(h => h.info).join('<hr>');

        fila.innerHTML = `
  <td>${t.nombre || '-'}</td>
  <td>
    <button class="btn-estado ${t.estado === 'ACTIVO' ? '' : 'inactivo'}"
      onclick="toggleEstado('${doc.id}', '${t.estado}')">${t.estado}</button>
  </td>
  <td>
    <button class="btn-editar" onclick="window.location.href='detalle_tours.html?id=${doc.id}'">✏️ Editar</button>
  </td>
  <td>
    <button class="btn-eliminar" onclick="eliminarTour('${doc.id}')">🗑️ Eliminar</button>
  </td>
`;
          tbody.appendChild(fila);
        });
      });
    }
    
    function eliminarTour(id) {
      if (confirm("¿Eliminar este tour?")) {
        db.collection("tours").doc(id).delete().then(() => cargarTours());
      }
    }

    function toggleEstado(id, estado) {
      const nuevo = estado === "ACTIVO" ? "INACTIVO" : "ACTIVO";
      db.collection("tours").doc(id).update({ estado: nuevo }).then(() => cargarTours());
    }

    function exportarTabla() {
      html2canvas(document.querySelector("#tablaTours")).then(canvas => {
        const imgData = canvas.toDataURL("image/png");
        const pdf = new jspdf.jsPDF();
        pdf.addImage(imgData, "PNG", 10, 10);
        pdf.save("tours.pdf");
      });
    }

    function descargarCSV() {
      const filas = document.querySelectorAll("#tablaTours tr");
      const csv = Array.from(filas).map(row =>
        Array.from(row.cells).map(cell => cell.textContent.trim()).join(",")
      ).join("\n");
      const blob = new Blob([csv], { type: 'text/csv' });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "tours.csv";
      a.click();
    }
function abrirOpcionales(tourId) {
  window.open(`opcionales.html?tourId=${tourId}`, '_blank');
}

    // NUEVO: menú lateral de navegación (igual que el resto del sistema)
    function inicializarMenuLateral() {
      const usuario = JSON.parse(localStorage.getItem("usuario"));
      const sidebar = document.getElementById("sidebar");
      const contenido = document.getElementById("contenidoPrincipal");
      const toggleBtn = document.querySelector('.toggle-btn');

      if (usuario) {
        document.getElementById("nombreUsuario").innerText = usuario.nombre || "Usuario";
        document.getElementById("rolUsuario").innerText = usuario.rol || "";
      } else {
        document.getElementById("nombreUsuario").innerText = "Invitado";
      }

      window.toggleSidebar = function () {
        sidebar.classList.toggle('active');
        contenido.classList.toggle('sidebar-visible');
      };

      window.cerrarSesionYRedirigir = function () {
        localStorage.removeItem("usuario");
        window.location.href = "login.html";
      };

      function checkScreenSize() {
        if (window.innerWidth <= 768) {
          sidebar.classList.remove('active');
          contenido.classList.remove('sidebar-visible');
        } else {
          sidebar.classList.add('active');
          contenido.classList.add('sidebar-visible');
        }
        toggleBtn.style.display = "block";
      }

      window.addEventListener('resize', checkScreenSize);
      checkScreenSize();
    }

    window.onload = function () {
      inicializarMenuLateral();
      cargarTours();
    };
  </script>
  <script src="topbar.js"></script>
  <!-- NUEVO: verificación real de sesión (Firebase Authentication), en vez
       de confiar solo en lo que dijera localStorage. -->
  <script src="auth-guard.js"></script>
</body>
