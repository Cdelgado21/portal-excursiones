<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Excursiones Delgado — Sistema Integral</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ---------- Portada ---------- */
    .portada {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
      background: radial-gradient(circle at 20% 20%, #0a6b73 0%, #02535a 45%, #013840 100%);
      color: white;
      overflow: hidden;
    }

    /* Decoración: líneas punteadas + avión, al estilo de las portadas que ya
       usa la agencia en sus comprobantes — todo dibujado con CSS/SVG, sin
       depender de ninguna imagen aparte. */
    .portada svg.decoracion {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0.55;
      pointer-events: none;
    }
    .portada .mapa-fondo {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.05) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0.6;
      pointer-events: none;
    }

    .portada-contenido {
      position: relative;
      z-index: 2;
      max-width: 780px;
    }

    .eslogan-superior {
      font-family: 'Brush Script MT', cursive;
      color: #ffb703;
      font-size: 1.6rem;
      margin-bottom: 10px;
      display: block;
    }

    .titulo-portada {
      font-size: clamp(2.2rem, 6vw, 4.2rem);
      font-weight: 900;
      line-height: 1.1;
      margin: 0 0 18px;
      text-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    .subtitulo-portada {
      font-size: clamp(1rem, 2.4vw, 1.3rem);
      color: #e6f2f2;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .logo-portada {
      width: 200px;
      max-width: 60vw;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.3));
    }

    /* ---------- Botón "Iniciar Sesión" (esquina superior) ---------- */
    .btn-iniciar-sesion-top {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 500;
      background: white;
      color: #02535a;
      border: none;
      padding: 12px 26px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      transition: transform 0.15s ease;
    }
    .btn-iniciar-sesion-top:hover {
      transform: translateY(-2px);
    }

    /* ---------- Panel de login tipo "push" (se desliza desde la derecha) ---------- */
    .overlay-login {
      position: fixed;
      inset: 0;
      background: rgba(2, 20, 22, 0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      z-index: 900;
    }
    .overlay-login.activo {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-login {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 100%;
      max-width: 420px;
      background: white;
      z-index: 950;
      transform: translateX(100%);
      transition: transform 0.35s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 36px;
      box-shadow: -10px 0 30px rgba(0,0,0,0.25);
      overflow-y: auto;
    }
    .panel-login.activo {
      transform: translateX(0);
    }

    .btn-cerrar-panel {
      position: absolute;
      top: 18px;
      right: 20px;
      background: none;
      border: none;
      font-size: 26px;
      color: #999;
      cursor: pointer;
      line-height: 1;
    }
    .btn-cerrar-panel:hover {
      color: #02535a;
    }

    .panel-login .logo {
      width: 130px;
      margin: 0 auto 20px;
      display: block;
    }

    .panel-login h1 {
      color: #02535a;
      margin-bottom: 4px;
      text-align: center;
      font-size: 1.5rem;
    }
    .panel-login p.subtitle {
      color: #666;
      margin-bottom: 26px;
      text-align: center;
      font-size: 0.95rem;
    }

    .input-group {
      position: relative;
    }
    .panel-login input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      display: block;
      font-size: 15px;
    }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }
    .panel-login button[type="submit"] {
      background-color: #02535a;
      color: white;
      padding: 13px;
      border: none;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 12px;
      font-size: 15px;
      font-weight: bold;
    }
    .panel-login button[type="submit"]:hover {
      background-color: #037177;
    }
    .forgot-password {
      display: block;
      margin-top: 12px;
      font-size: 0.9em;
      color: #02535a;
      text-decoration: none;
      text-align: center;
    }
    .forgot-password:hover {
      text-decoration: underline;
    }

    /* ---------- Modal de bienvenida (tras iniciar sesión) ---------- */
    #modal-bienvenida {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #02535a;
      color: white;
      padding: 25px 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
      z-index: 1000;
      text-align: center;
      font-size: 1.1rem;
      max-width: 90vw;
    }

    @media screen and (max-width: 480px) {
      .panel-login {
        max-width: 100%;
        padding: 30px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- ---------- Portada ---------- -->
  <div class="portada">
    <div class="mapa-fondo"></div>
    <svg class="decoracion" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
      <path d="M 80 650 C 250 600, 350 500, 300 400" stroke="white" stroke-width="2" stroke-dasharray="6 8" fill="none" opacity="0.5"/>
      <circle cx="300" cy="400" r="7" fill="white" opacity="0.7"/>
      <path d="M 950 120 C 1050 180, 1120 260, 1080 340" stroke="white" stroke-width="2" stroke-dasharray="6 8" fill="none" opacity="0.5"/>
      <circle cx="1080" cy="340" r="7" fill="white" opacity="0.7"/>
      <g transform="translate(140,90) rotate(-20)" opacity="0.6">
        <path d="M0 10 L36 0 L40 6 L14 14 L20 24 L10 22 L0 10 Z" fill="white"/>
      </g>
      <g transform="translate(980 620) rotate(140)" opacity="0.5">
        <path d="M0 10 L36 0 L40 6 L14 14 L20 24 L10 22 L0 10 Z" fill="white"/>
      </g>
    </svg>

    <div class="portada-contenido">
      <span class="eslogan-superior">Oficialmente somos los que convierten tus sueños en destinos</span>
      <h1 class="titulo-portada">Tu aventura comienza aquí</h1>
      <p class="subtitulo-portada">Sistema Integral de Excursiones Delgado</p>
      <img src="PNG LOGO EXCURSIONES DELGADO BLANCO.png (1).png" alt="Logo Excursiones Delgado" class="logo-portada">
    </div>
  </div>

  <!-- ---------- Botón fijo arriba a la derecha ---------- -->
  <button class="btn-iniciar-sesion-top" onclick="abrirPanelLogin()">Iniciar Sesión</button>

  <!-- ---------- Panel de login (se desliza desde la derecha) ---------- -->
  <div class="overlay-login" id="overlayLogin" onclick="cerrarPanelLogin()"></div>
  <div class="panel-login" id="panelLogin">
    <button type="button" class="btn-cerrar-panel" onclick="cerrarPanelLogin()">&times;</button>
    <img src="LOGO SIED.JPG" alt="Logo Excursiones Delgado" class="logo">
    <h1>Sistema Integral</h1>
    <form id="loginForm">
      <input type="email" id="correo" placeholder="Correo electrónico" required>
      <div class="input-group">
        <input type="password" id="clave" placeholder="Contraseña" required>
        <span class="toggle-password" onclick="togglePassword()">
          <img id="eyeIcon" src="https://cdn-icons-png.flaticon.com/512/709/709612.png" width="20" alt="Mostrar">
        </span>
      </div>
      <a href="#" id="linkOlvideContrasena" class="forgot-password" onclick="recuperarContrasena(); return false;">¿Olvidaste tu contraseña?</a>
      <button type="submit">Iniciar Sesión</button>
    </form>
  </div>

  <div id="modal-bienvenida"></div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDUEZgkrW-3HbZu2BLej4v0mbDHZf2vRo8",
    authDomain: "tours-460717.firebaseapp.com",
    projectId: "tours-460717",
    storageBucket: "tours-460717.firebasestorage.app",
    messagingSenderId: "1000749333444",
    appId: "1:1000749333444:web:73437891b59a96b6a4c291"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // NUEVO: abre/cierra el panel de login "tipo push" que se desliza desde
  // la derecha, en vez de mostrar el formulario siempre visible.
  function abrirPanelLogin() {
    document.getElementById("panelLogin").classList.add("activo");
    document.getElementById("overlayLogin").classList.add("activo");
    document.getElementById("correo").focus();
  }
  function cerrarPanelLogin() {
    document.getElementById("panelLogin").classList.remove("activo");
    document.getElementById("overlayLogin").classList.remove("activo");
  }

  function togglePassword() {
    const passwordInput = document.getElementById('clave');
    const icon = document.getElementById('eyeIcon');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.src = "OJO.PNG"; // Cambia si usas otro ícono
    } else {
      passwordInput.type = 'password';
      icon.src = "ojo-cerrado.png";
    }
  }

  // NUEVO: si venimos de un cierre de sesión automático (por inactividad,
  // o porque auth-guard.js detectó que no había sesión real), avisamos y
  // abrimos el panel de una vez para que no tenga que buscar el botón.
  const parametrosURL = new URLSearchParams(window.location.search);
  const motivo = parametrosURL.get("motivo");
  if (motivo === "inactividad") {
    alert("Tu sesión se cerró automáticamente por 30 minutos de inactividad. Vuelve a iniciar sesión.");
    abrirPanelLogin();
  } else if (motivo === "sesion_requerida") {
    alert("Necesitas iniciar sesión para entrar ahí.");
    abrirPanelLogin();
  } else if (motivo === "usuario_inactivo") {
    alert("Tu usuario está marcado como inactivo. Contacta a un administrador.");
  } else if (motivo === "usuario_no_encontrado") {
    alert("Tu cuenta no tiene un perfil configurado en el sistema. Contacta a un administrador.");
  }

  // FIX DE SEGURIDAD: antes, el login comparaba la contraseña escrita
  // directamente contra el campo "clave" guardado en texto plano en
  // Firestore — cualquiera que pudiera leer la colección "usuarios" (o que
  // encontrara mal configuradas las reglas de Firestore) veía la contraseña
  // de todos tal cual. Ahora la validación pasa por Firebase Authentication
  // real: la contraseña nunca se guarda ni se compara a mano, Firebase se
  // encarga de eso de forma segura. El documento en Firestore
  // (usuarios/{uid}, usando el mismo UID que Firebase Authentication) solo
  // guarda datos de perfil (nombre, rol, estado) — nunca la contraseña.
  // NUEVO: "¿Olvidaste tu contraseña?" ahora funciona de verdad — usa el
  // sistema de recuperación de Firebase Authentication, que le manda a la
  // persona un correo con un enlace para elegir una contraseña nueva. Nadie
  // del equipo (ni tú) llega a ver ni a manejar la contraseña en el proceso.
  async function recuperarContrasena() {
    const email = document.getElementById('correo').value.trim();

    if (!email) {
      alert("Primero escribe tu correo en el campo de arriba, y luego dale clic aquí de nuevo.");
      document.getElementById('correo').focus();
      return;
    }

    try {
      await firebase.auth().sendPasswordResetEmail(email);
      // NOTA DE SEGURIDAD: el mensaje es el mismo exista o no esa cuenta —
      // así nadie puede usar este formulario para "adivinar" qué correos
      // están registrados en el sistema (esto se llama evitar la
      // "enumeración de usuarios").
      alert(`Si ${email} tiene una cuenta en el sistema, te llegará un correo con instrucciones para elegir una contraseña nueva. Revisa también la carpeta de spam.`);
    } catch (error) {
      console.error("Error al enviar el correo de recuperación:", error);
      if (error.code === "auth/invalid-email") {
        alert("Ese correo no tiene un formato válido. Revísalo e intenta de nuevo.");
      } else if (error.code === "auth/too-many-requests") {
        alert("Se hicieron demasiados intentos seguidos. Espera un momento antes de volver a intentar.");
      } else {
        // Mismo mensaje genérico también en caso de error, por la misma
        // razón de seguridad explicada arriba (no revelar si la cuenta existe).
        alert(`Si ${email} tiene una cuenta en el sistema, te llegará un correo con instrucciones para elegir una contraseña nueva. Revisa también la carpeta de spam.`);
      }
    }
  }

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('correo').value.trim();
    const password = document.getElementById('clave').value.trim();

    try {
      const credencial = await firebase.auth().signInWithEmailAndPassword(email, password);
      const uid = credencial.user.uid;

      const docUsuario = await db.collection("usuarios").doc(uid).get();

      if (!docUsuario.exists) {
        alert("Tu cuenta no tiene un perfil configurado en el sistema. Contacta a un administrador.");
        await firebase.auth().signOut();
        return;
      }

      const usuario = docUsuario.data();

      if (usuario.estado !== "Activo") {
        alert("El usuario no está activo.");
        await firebase.auth().signOut();
        return;
      }

      const usuarioConId = { id: uid, ...usuario };
      localStorage.setItem("usuario", JSON.stringify(usuarioConId));

      const nombre = usuario.nombre || email;
      const modal = document.getElementById("modal-bienvenida");
      modal.textContent = `¡Bienvenido/a ${nombre}!`;
      modal.style.display = "block";
      setTimeout(() => {
        modal.style.display = "none";
        if (usuario.rol === "Administrador") {
          window.location.href = "dashboard.html";
        } else {
          window.location.href = "menu.html";
        }
      }, 2000);

    } catch (error) {
      console.error("Error al iniciar sesión:", error);
      if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
        alert("Correo o contraseña incorrectos.");
      } else if (error.code === "auth/too-many-requests") {
        alert("Demasiados intentos fallidos. Espera un momento antes de volver a intentar.");
      } else {
        alert("Ocurrió un error al validar tus datos.");
      }
    }
  });
</script>
</body>
</html>
