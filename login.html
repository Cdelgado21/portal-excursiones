<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Excursiones Delgado</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <style>
    body {
      background-color: #f4f7f8;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-container {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      color: #02535a;
      margin-bottom: 10px;
    }
    p.subtitle {
      color: #555;
      margin-bottom: 20px;
    }
    .input-group {
      position: relative;
    }
    input {
      width: calc(100% - 24px);
      padding: 12px;
      margin: 10px auto;
      border: 1px solid #ccc;
      border-radius: 6px;
      display: block;
    }
    .toggle-password {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }
    .login-container button {
      background-color: #02535a;
      color: white;
      padding: 12px;
      border: none;
      width: 100%;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover {
      background-color: #037177;
    }
    .logo {
      width: 180px;
      margin-bottom: 20px;
    }
    .forgot-password {
      display: block;
      margin-top: 10px;
      font-size: 0.9em;
      color: #02535a;
      text-decoration: none;
    }
    .forgot-password:hover {
      text-decoration: underline;
    }
    .welcome-msg {
      margin-top: 10px;
      color: #02535a;
      font-weight: bold;
    }
    @media screen and (max-width: 480px) {
      .login-container {
        padding: 20px;
      }
      input {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="LOGO SIED.JPG" alt="Logo Excursiones Delgado" class="logo">
    <h1>Sistema Integral</h1>
    <p class="subtitle">"Expertos en Aventuras"</p>
    <form id="loginForm">
      <input type="email" id="correo" placeholder="Correo electrónico" required>
      <div class="input-group">
        <input type="password" id="clave" placeholder="Contraseña" required>
        <span class="toggle-password" onclick="togglePassword()">
          <img id="eyeIcon" src="https://cdn-icons-png.flaticon.com/512/709/709612.png" width="20" alt="Mostrar">
        </span>
      </div>
      <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      <button type="submit">Iniciar Sesión</button>
    </form>
    <div id="modal-bienvenida" style="
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #02535a;
  color: white;
  padding: 25px 30px;
  border-radius: 12px;
  box-shadow: 0 0 10px rgba(0,0,0,0.3);
  z-index: 1000;
  text-align: center;
  font-size: 1.1rem;">
</div>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDUEZgkrW-3HbZu2BLej4v0mbDHZf2vRo8",
    authDomain: "tours-460717.firebaseapp.com",
    projectId: "tours-460717",
    storageBucket: "tours-460717.firebasestorage.app",
    messagingSenderId: "1000749333444",
    appId: "1:1000749333444:web:73437891b59a96b6a4c291"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function togglePassword() {
    const passwordInput = document.getElementById('clave');
    const icon = document.getElementById('eyeIcon');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.src = "OJO.PNG"; // Cambia si usas otro ícono
    } else {
      passwordInput.type = 'password';
      icon.src = "ojo-cerrado.png";
    }
  }

  // NUEVO: si venimos de un cierre de sesión automático (por inactividad,
  // o porque auth-guard.js detectó que no había sesión real), avisamos.
  const parametrosURL = new URLSearchParams(window.location.search);
  const motivo = parametrosURL.get("motivo");
  if (motivo === "inactividad") {
    alert("Tu sesión se cerró automáticamente por 30 minutos de inactividad. Vuelve a iniciar sesión.");
  } else if (motivo === "sesion_requerida") {
    alert("Necesitas iniciar sesión para entrar ahí.");
  } else if (motivo === "usuario_inactivo") {
    alert("Tu usuario está marcado como inactivo. Contacta a un administrador.");
  } else if (motivo === "usuario_no_encontrado") {
    alert("Tu cuenta no tiene un perfil configurado en el sistema. Contacta a un administrador.");
  }

  // FIX DE SEGURIDAD: antes, el login comparaba la contraseña escrita
  // directamente contra el campo "clave" guardado en texto plano en
  // Firestore — cualquiera que pudiera leer la colección "usuarios" (o que
  // encontrara mal configuradas las reglas de Firestore) veía la contraseña
  // de todos tal cual. Ahora la validación pasa por Firebase Authentication
  // real: la contraseña nunca se guarda ni se compara a mano, Firebase se
  // encarga de eso de forma segura. El documento en Firestore
  // (usuarios/{uid}, usando el mismo UID que Firebase Authentication) solo
  // guarda datos de perfil (nombre, rol, estado) — nunca la contraseña.
  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const email = document.getElementById('correo').value.trim();
    const password = document.getElementById('clave').value.trim();

    try {
      const credencial = await firebase.auth().signInWithEmailAndPassword(email, password);
      const uid = credencial.user.uid;

      const docUsuario = await db.collection("usuarios").doc(uid).get();

      if (!docUsuario.exists) {
        alert("Tu cuenta no tiene un perfil configurado en el sistema. Contacta a un administrador.");
        await firebase.auth().signOut();
        return;
      }

      const usuario = docUsuario.data();

      if (usuario.estado !== "Activo") {
        alert("El usuario no está activo.");
        await firebase.auth().signOut();
        return;
      }

      const usuarioConId = { id: uid, ...usuario };
      localStorage.setItem("usuario", JSON.stringify(usuarioConId));

      const nombre = usuario.nombre || email;
      const modal = document.getElementById("modal-bienvenida");
      modal.textContent = `¡Bienvenido ${nombre}!`;
      modal.style.display = "block";
      setTimeout(() => {
        modal.style.display = "none";
        if (usuario.rol === "Administrador") {
          window.location.href = "dashboard.html";
        } else {
          window.location.href = "menu.html";
        }
      }, 2000);

    } catch (error) {
      console.error("Error al iniciar sesión:", error);
      if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
        alert("Correo o contraseña incorrectos.");
      } else if (error.code === "auth/too-many-requests") {
        alert("Demasiados intentos fallidos. Espera un momento antes de volver a intentar.");
      } else {
        alert("Ocurrió un error al validar tus datos.");
      }
    }
  });
</script>
</body>
</html>
